# =========================================================================
# Particle Identification from Detector Responses - Configurazione Progetto
# =========================================================================

# --- Percorsi ---
paths:
  data_dir: "data"
  output_dir: "outputs"
  figures_dir: "outputs/figures"
  models_dir: "outputs/models"
  results_dir: "outputs/results"
  log_dir: "outputs/logs"

# --- Dataset Kaggle ---
dataset:
  kaggle_slug: "naharrison/particle-identification-from-detector-responses"
  filename: "pid-5M.csv"          # Nome del CSV dentro l'archivio
  test_size: 0.15                 # 15% del totale per il test set
  val_size: 0.2                   # 20% del train per il validation set (corrisponde al 17% del totale)
  random_state: 42
  max_samples: null               # null = usa tutto il dataset

# --- Nomi delle feature e target ---
features:
  # Le 6 risposte dei rivelatori + momento
  names:
    - "p"           # Momento della particella (GeV/c)
    - "theta"       # Angolo polare (rad)
    - "beta"        # Velocità relativistica (v/c)
    - "nphe"        # Numero di fotoelettroni (Cherenkov)
    - "ein"         # Energia depositata inner calorimeter
    - "eout"        # Energia depositata outer calorimeter
  target: "id"      # Colonna target (tipo di particella)

# --- Baseline a tagli (cuts-based PID) ---
baseline_cuts:
  enabled: true
  low_percentile: 10      # Limite inferiore per il range
  high_percentile: 90     # Limite superiore per il range
  show_range: true        # Visualizza i range calcolati per ogni classe

# --- Modelli classici di ML ---
classical_models:
  logistic_regression:
    enabled: true
    max_iter: 1500
    multi_class: "multinomial"
    solver: "lbfgs"
    class_weight: "balanced"
  knn:
    enabled: true
    n_neighbors: 7
  decision_tree:
    enabled: true
    max_depth: 15
    class_weight: "balanced"
  random_forest:
    enabled: true
    n_estimators: 300
    max_depth: 15
    n_jobs: -1
    class_weight: "balanced"
  xgboost:
    enabled: true
    n_estimators: 300
    max_depth: 15
    learning_rate: 0.1
    n_jobs: -1
    eval_metric: "mlogloss"

# --- Cross-validation ---
cross_validation:
  enabled: true
  n_folds: 5
  shuffle: true
  stratified: true

# --- Deep Learning (MLP) ---
deep_learning:
  hidden_layers: [64, 128, 256, 128]  # Architettura MLP
  dropout: 0.3                        # Dropout per regolarizzazione
  learning_rate: 0.001                # Learning rate per ottimizzazione
  batch_size: 512                     # Dimensione del batch
  epochs: 100                         # Numero massimo di epoche
  early_stopping_patience: 20         # Pazienza per early stopping
  weight_decay: 0.0001                # Learning rate decay (L2 regularization)
  show_architecture: true

# --- Interpretabilità (SHAP) ---
interpretability:
  enabled: true
  shap_samples: 1500                  # Numero di campioni per calcolo SHAP values

# --- Uncertainty Quantification ---
uncertainty:
  enabled: true
  mc_dropout_iterations: 100           # Numero di forward pass per MC Dropout

# --- Visualizzazione ---
visualization:
  graph: true                         # Stampa i grafici durante l'esecuzione
  dpi: 600
  figsize: [12, 8]
  style: "seaborn-v0_8-whitegrid"
  palette: "Set2"
  comparison_metrics:       # Metriche utilizzate per la creazione dei grafici individuali
    - "accuracy"
    - "precision_macro"
    - "recall_macro"
    - "f1_macro"
    - "precision_weighted"
    - "recall_weighted"
    - "f1_weighted"
  comparison_group_metrics: # Metriche utilizzate per la creazione del grafico congiunto
    - "accuracy"
    - "precision_macro"
    - "recall_macro"
    - "f1_macro"
